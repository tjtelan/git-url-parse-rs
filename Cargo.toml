[package]
authors = ["T.J. Telan <t.telan@gmail.com>"]
categories = ["parser-implementations", "encoding"]
description = "A parser for git repo urls based on url crate"
documentation = "https://docs.rs/git-url-parse"
edition = "2021"
keywords = ["git", "url", "parsing", "normalize"]
license = "MIT"
name = "git-url-parse"
readme = "README.md"
repository = "https://github.com/tjtelan/git-url-parse-rs"
version = "0.5.0"

[features]
#default = []
#full = ["error_handle_reporting"]
#error_handle_reporting = ["color-eyre"]

[dependencies]
tracing = "0.1"
url = "^2.2"
strum = "^0.25"
strum_macros = "^0.25"
regex = "^1.4"
thiserror = "1.0.50"

[dev-dependencies]
env_logger = "^0.10"
color-eyre = "^0.6"